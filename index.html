<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #111; color: #eee; padding: 20px; }
.container { max-width: 1000px; margin: 0 auto; }
.topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
h1 { font-size: 24px; }
.refresh { background: #333; color: #eee; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.refresh:hover { background: #444; }
.stats { display: flex; gap: 12px; margin-bottom: 20px; }
.stat { flex: 1; background: #1e1e1e; padding: 14px; border-radius: 8px; text-align: center; }
.stat-num { font-size: 28px; font-weight: 700; }
.stat-label { font-size: 11px; color: #888; margin-top: 4px; }
.urgent-num { color: #ef4444; } .important-num { color: #f59e0b; } .action-num { color: #3b82f6; } .fyi-num { color: #10b981; }
.filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-btn { padding: 7px 16px; border: 1px solid #444; background: #1e1e1e; color: #eee; border-radius: 20px; cursor: pointer; font-size: 13px; }
.filter-btn.active { background: #2563eb; border-color: #2563eb; }
.emails { display: grid; gap: 10px; }
.email { background: #1e1e1e; border-left: 4px solid; border-radius: 8px; overflow: hidden; cursor: pointer; transition: box-shadow 0.2s; }
.email:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.4); }
.urgent { border-color: #ef4444; } .important { border-color: #f59e0b; } .action { border-color: #3b82f6; } .fyi { border-color: #10b981; }
.email-header { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; }
.badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 3px; display: inline-block; margin-bottom: 5px; }
.badge-urgent { background: #ef4444; } .badge-important { background: #f59e0b; color:#000; } .badge-action { background: #3b82f6; } .badge-fyi { background: #10b981; color:#000; }
.subject { font-weight: 600; font-size: 14px; margin-bottom: 3px; }
.from { font-size: 12px; color: #888; }
.btns { display: flex; gap: 8px; flex-shrink: 0; }
.btn { padding: 6px 14px; font-size: 11px; border: 1px solid #444; background: #2a2a2a; color: #eee; border-radius: 4px; cursor: pointer; }
.btn:hover { background: #333; }
.expanded { background: #171717; padding: 14px 16px; border-top: 1px solid #2a2a2a; }
.body-text { font-size: 13px; color: #bbb; line-height: 1.6; margin-bottom: 10px; }
.task-box { background: #1a2a3a; border-left: 3px solid #3b82f6; padding: 8px 12px; border-radius: 4px; font-size: 12px; margin: 6px 0; }
.deadline-box { background: #2a1a1a; border-left: 3px solid #ef4444; padding: 8px 12px; border-radius: 4px; font-size: 12px; margin: 6px 0; color: #f87171; }
.done { opacity: 0.35; }
.loading { text-align: center; padding: 40px; color: #888; }
.error { background: #2a1a1a; color: #f87171; padding: 12px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <h1>📧 Email Triage Dashboard</h1>
    <button class="refresh" onclick="loadEmails()">🔄 Refresh</button>
  </div>

  <div id="error"></div>
  <div id="stats" class="stats" style="display:none"></div>
  <div id="filters" class="filters" style="display:none"></div>
  <div id="emails" class="emails"><div class="loading">Loading your emails...</div></div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbxHUp9nf6vume4_MrjqhfRgubauKcOTYuh4mIawAyuRT1YdZEYNtXBQrQyB8TUC-rki/exec';
let all = [], filter = 'ALL';

async function loadEmails() {
  document.getElementById('emails').innerHTML = '<div class="loading">Loading your emails...</div>';
  document.getElementById('error').innerHTML = '';

  try {
    const res = await fetch(API);
    all = await res.json();
    if (!all.length) return showError('No emails found.');
    render();
  } catch (err) {
    showError('Failed to load emails. Make sure your Apps Script is deployed and accessible.');
  }
}

function render() {
  const counts = { URGENT:0, IMPORTANT:0, ACTION:0, FYI:0 };
  all.forEach(e => counts[e.category] = (counts[e.category]||0)+1);

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-num urgent-num">${counts.URGENT||0}</div><div class="stat-label">Urgent</div></div>
    <div class="stat"><div class="stat-num important-num">${counts.IMPORTANT||0}</div><div class="stat-label">Important</div></div>
    <div class="stat"><div class="stat-num action-num">${counts.ACTION||0}</div><div class="stat-label">Action</div></div>
    <div class="stat"><div class="stat-num fyi-num">${counts.FYI||0}</div><div class="stat-label">FYI</div></div>
  `;
  document.getElementById('stats').style.display = 'flex';

  document.getElementById('filters').innerHTML = ['ALL','URGENT','IMPORTANT','ACTION','FYI'].map(f =>
    `<button class="filter-btn ${f===filter?'active':''}" onclick="setFilter('${f}')">${f}</button>`
  ).join('');
  document.getElementById('filters').style.display = 'flex';

  const list = filter==='ALL' ? all : all.filter(e => e.category===filter);
  document.getElementById('emails').innerHTML = list.length ? list.map((e,i) => `
    <div class="email ${e.category.toLowerCase()} ${e.done?'done':''}" id="email-${i}">
      <div class="email-header" onclick="toggle(${i})">
        <div>
          <div class="badge badge-${e.category.toLowerCase()}">${e.category}</div>
          <div class="subject">${e.subject}</div>
          <div class="from">${e.from}</div>
        </div>
        <div class="btns" onclick="event.stopPropagation()">
          <button class="btn" onclick="markDone(${i})">✓ Done</button>
          <button class="btn" onclick="snooze(${i})">⏰ Snooze</button>
        </div>
      </div>
      <div id="exp-${i}" style="display:none">
        <div class="expanded">
          ${e.body ? `<div class="body-text">${e.body}</div>` : ''}
          ${e.task ? `<div class="task-box">📌 ${e.task}</div>` : ''}
          ${e.deadline ? `<div class="deadline-box">⏰ ${e.deadline}</div>` : ''}
        </div>
      </div>
    </div>
  `).join('') : '<div style="text-align:center;padding:30px;color:#888;">No emails in this category</div>';
}

function toggle(i) {
  const el = document.getElementById(`exp-${i}`);
  el.style.display = el.style.display==='none' ? 'block' : 'none';
}

function markDone(i) { all[i].done = true; render(); }
function snooze(i) { all.splice(i,1); render(); }
function setFilter(f) { filter = f; render(); }
function showError(msg) { document.getElementById('error').innerHTML = `<div class="error">⚠️ ${msg}</div>`; document.getElementById('emails').innerHTML = ''; }

loadEmails();
</script>
</body>
</html>
